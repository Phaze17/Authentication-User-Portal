<!doctype html>
<!--
* Tabler - Premium and Open Source dashboard template
* Session guard added — unauthenticated users are redirected to sign-in.html
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Dashboard - Phaze17 Portal</title>
    <link href="./dist/css/tabler.css?1752393270" rel="stylesheet" />
    <link href="./dist/css/tabler-flags.css?1752393270" rel="stylesheet" />
    <link href="./dist/css/tabler-socials.css?1752393270" rel="stylesheet" />
    <link href="./dist/css/tabler-payments.css?1752393270" rel="stylesheet" />
    <link href="./dist/css/tabler-vendors.css?1752393270" rel="stylesheet" />
    <link href="./dist/css/tabler-marketing.css?1752393270" rel="stylesheet" />
    <link href="./dist/css/tabler-themes.css?1752393270" rel="stylesheet" />
    <link href="./preview/css/demo.css?1752393270" rel="stylesheet" />
    <style>
      @import url("https://rsms.me/inter/inter.css");
      /* Hide page content until auth check completes */
      body { visibility: hidden; }
      body.auth-ready { visibility: visible; }
    </style>
  </head>
  <body>
    <!-- Session guard runs before anything renders -->
    <script type="module">
      import { requireAuth, signOut } from './js/auth.js';

      (async () => {
        const session = await requireAuth();
        // requireAuth redirects if no session, so if we're here we're good
        document.body.classList.add('auth-ready');

        // Expose signOut globally so logout buttons can call it
        window.signOut = signOut;

        // Optionally show the user's email somewhere
        const emailEl = document.getElementById('user-email');
        if (emailEl && session) {
          emailEl.textContent = session.user.email;
        }
      })();
    </script>

    <script src="./dist/js/tabler-theme.min.js?1752393270"></script>

    <div class="page">
      <!-- NAVBAR -->
      <header class="navbar navbar-expand-md d-print-none">
        <div class="container-xl">
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu">
            <span class="navbar-toggler-icon"></span>
          </button>
          <h1 class="navbar-brand navbar-brand-autodark d-none-navbar-horizontal pe-0 pe-md-3">
            <a href=".">Phaze17 Portal</a>
          </h1>
          <div class="navbar-nav flex-row order-md-last">
            <div class="nav-item dropdown">
              <a href="#" class="nav-link d-flex lh-1 text-reset p-0" data-bs-toggle="dropdown">
                <div class="d-none d-xl-block ps-2">
                  <div class="mt-1 small text-secondary" id="user-email">Loading...</div>
                </div>
              </a>
              <div class="dropdown-menu dropdown-menu-end dropdown-menu-arrow">
                <a href="./settings.html" class="dropdown-item">Settings</a>
                <div class="dropdown-divider"></div>
                <a href="#" class="dropdown-item" onclick="window.signOut(); return false;">Sign out</a>
              </div>
            </div>
          </div>
        </div>
      </header>

      <!-- PAGE CONTENT -->
      <div class="page-wrapper">
        <div class="page-header d-print-none">
          <div class="container-xl">
            <div class="row g-2 align-items-center">
              <div class="col">
                <h2 class="page-title">Dashboard</h2>
              </div>
            </div>
          </div>
        </div>
        <div class="page-body">
          <div class="container-xl">
            <div class="row row-deck row-cards">
              <div class="col-12">
                <div class="card">
                  <div class="card-header">
                    <h3 class="card-title">Welcome</h3>
                  </div>
                  <div class="card-body">
                    <p>You are signed in as <strong id="user-email-body"></strong>.</p>
                    <button class="btn btn-danger" onclick="window.signOut()">Sign out</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./dist/js/tabler.min.js?1752393270" defer></script>
    <script src="./preview/js/demo.min.js?1752393270" defer></script>
    <script type="module">
      import { getSession } from './js/auth.js';
      const session = await getSession();
      const el = document.getElementById('user-email-body');
      if (el && session) el.textContent = session.user.email;
    </script>
  </body>
</html>
