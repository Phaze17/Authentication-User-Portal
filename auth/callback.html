<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Authenticating...</title>
    <link href="../dist/css/tabler.css?1752393270" rel="stylesheet" />
    <style>
      @import url("https://rsms.me/inter/inter.css");
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: var(--tblr-bg-surface, #f4f6fa);
      }
      .callback-card {
        text-align: center;
        padding: 2rem;
      }
      .spinner-border {
        width: 2rem;
        height: 2rem;
      }
    </style>
  </head>
  <body>
    <div class="callback-card">
      <div class="spinner-border text-primary mb-3" role="status"></div>
      <p class="text-secondary" id="status-msg">Completing sign in...</p>
    </div>

    <script type="module">
      import { supabase } from '../js/supabase-config.js';

      const statusMsg = document.getElementById('status-msg');

      (async () => {
        // exchangeCodeForSession handles the ?code= param from GitHub OAuth
        const { data, error } = await supabase.auth.exchangeCodeForSession(
          window.location.href
        );

        if (error) {
          console.error('Auth callback error:', error.message);
          statusMsg.textContent = 'Sign in failed. Redirecting...';
          setTimeout(() => {
            window.location.href = '../sign-in.html';
          }, 2000);
          return;
        }

        // Session is established — go to dashboard
        window.location.href = '../dashboard.html';
      })();
    </script>
  </body>
</html>
