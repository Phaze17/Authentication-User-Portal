<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Phaze17 Client Portal - Sign In</title>
    <!-- BEGIN GLOBAL MANDATORY STYLES -->
    <link href="./dist/css/tabler.css?1752393270" rel="stylesheet" />
    <!-- END GLOBAL MANDATORY STYLES -->
    <!-- BEGIN PLUGINS STYLES -->
    <link href="./dist/css/tabler-flags.css?1752393270" rel="stylesheet" />
    <link href="./dist/css/tabler-socials.css?1752393270" rel="stylesheet" />
    <link href="./dist/css/tabler-payments.css?1752393270" rel="stylesheet" />
    <link href="./dist/css/tabler-vendors.css?1752393270" rel="stylesheet" />
    <link href="./dist/css/tabler-marketing.css?1752393270" rel="stylesheet" />
    <link href="./dist/css/tabler-themes.css?1752393270" rel="stylesheet" />
    <!-- END PLUGINS STYLES -->
    <!-- BEGIN DEMO STYLES -->
    <link href="./preview/css/demo.css?1752393270" rel="stylesheet" />
    <!-- END DEMO STYLES -->
    <!-- BEGIN CUSTOM FONT -->
    <style>
      @import url("https://rsms.me/inter/inter.css");
    </style>
    <!-- END CUSTOM FONT -->
    <!-- BEGIN SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- END SUPABASE -->
  </head>
  <body class="d-flex flex-column bg-white">
    <!-- BEGIN GLOBAL THEME SCRIPT -->
    <script src="./dist/js/tabler-theme.min.js?1752393270"></script>
    <!-- END GLOBAL THEME SCRIPT -->
    <div class="row g-0 flex-fill">
      <div class="col-12 col-lg-6 col-xl-4 border-top-wide border-primary d-flex flex-column justify-content-center">
        <div class="container container-tight my-5 px-lg-5">
          <div class="text-center mb-4">
            <span class="h2 fw-bold text-primary">Phaze17</span>
            <div class="text-muted small mt-1">Client Portal</div>
          </div>
          <h2 class="h3 text-center mb-3">Login to your account</h2>

          <!-- ERROR ALERT -->
          <div id="auth-error" class="alert alert-danger d-none" role="alert">
            <span id="auth-error-message"></span>
          </div>

          <form id="login-form" autocomplete="off" novalidate>
            <div class="mb-3">
              <label class="form-label" for="email">Email address</label>
              <input
                id="email"
                type="email"
                class="form-control"
                placeholder="your@email.com"
                autocomplete="off"
                required
              />
            </div>
            <div class="mb-2">
              <label class="form-label" for="password">
                Password
                <span class="form-label-description">
                  <a href="./forgot-password.html">I forgot password</a>
                </span>
              </label>
              <div class="input-group input-group-flat">
                <input
                  id="password"
                  type="password"
                  class="form-control"
                  placeholder="Your password"
                  autocomplete="off"
                  required
                />
                <span class="input-group-text">
                  <a href="#" class="link-secondary" title="Show password" id="toggle-password">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-1">
                      <path d="M10 12a2 2 0 1 0 4 0a2 2 0 0 0 -4 0" />
                      <path d="M21 12c-2.4 4 -5.4 6 -9 6c-3.6 0 -6.6 -2 -9 -6c2.4 -4 5.4 -6 9 -6c3.6 0 6.6 2 9 6" />
                    </svg>
                  </a>
                </span>
              </div>
            </div>
            <div class="mb-2">
              <label class="form-check">
                <input type="checkbox" class="form-check-input" id="remember-me" />
                <span class="form-check-label">Remember me on this device</span>
              </label>
            </div>
            <div class="form-footer">
              <button type="submit" class="btn btn-primary w-100" id="submit-btn">
                <span id="submit-text">Sign in</span>
                <span id="submit-spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
              </button>
            </div>
          </form>
          <div class="text-center text-secondary mt-3">Don't have account yet? <a href="./sign-up.html" tabindex="-1">Sign up</a></div>
        </div>
      </div>
      <div class="col-12 col-lg-6 col-xl-8 d-none d-lg-block">
        <div class="bg-cover h-100 min-vh-100" style="background-image: url(./static/photos/finances-us-dollars-and-bitcoins-currency-money-2.jpg)"></div>
      </div>
    </div>
    <!-- BEGIN GLOBAL MANDATORY SCRIPTS -->
    <script src="./dist/js/tabler.min.js?1752393270" defer></script>
    <!-- END GLOBAL MANDATORY SCRIPTS -->
    <!-- BEGIN DEMO SCRIPTS -->
    <script src="./preview/js/demo.min.js?1752393270" defer></script>
    <!-- END DEMO SCRIPTS -->
    <!-- BEGIN AUTH SCRIPT -->
    <script>
      // Init Supabase
      const SUPABASE_URL = 'https://ygjcmbihlaensweosszj.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlnamNtYmlobGFlbnN3ZW9zc3pqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU5NjE1OTcsImV4cCI6MjA4MTUzNzU5N30.mLvwmZJoEXcWcqmbZGC0mNa12wPx9fonl7tv6NvZcTg';
      const { createClient } = supabase;
      const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // If already logged in, bounce to portal
      (async () => {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) window.location.href = './portal.html';
      })();

      // Password show/hide toggle
      document.getElementById('toggle-password').addEventListener('click', function (e) {
        e.preventDefault();
        const pwd = document.getElementById('password');
        pwd.type = pwd.type === 'password' ? 'text' : 'password';
      });

      // Login form handler
      document.getElementById('login-form').addEventListener('submit', async function (e) {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorBox = document.getElementById('auth-error');
        const errorMsg = document.getElementById('auth-error-message');
        const submitBtn = document.getElementById('submit-btn');
        const submitText = document.getElementById('submit-text');
        const spinner = document.getElementById('submit-spinner');

        // Reset error state
        errorBox.classList.add('d-none');

        // Show spinner
        submitBtn.disabled = true;
        submitText.classList.add('d-none');
        spinner.classList.remove('d-none');

        const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

        if (error) {
          errorMsg.textContent = error.message;
          errorBox.classList.remove('d-none');
          submitBtn.disabled = false;
          submitText.classList.remove('d-none');
          spinner.classList.add('d-none');
          return;
        }

        // Success — go to portal
        window.location.href = './portal.html';
      });
    </script>
    <!-- END AUTH SCRIPT -->
  </body>
</html>
